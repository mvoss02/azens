<div class="shell">
  <!-- Mobile-only floating hamburger. Not wrapped in a top bar so it
       doesn't steal vertical space on narrow viewports — it just floats
       over the top-left corner of the content. The logo is visible inside
       the drawer itself when opened, which is enough branding for mobile. -->
  <button
    type="button"
    class="mobile-menu-btn"
    (click)="toggleMobileNav()"
    [class.is-open]="mobileNavOpen()"
    [attr.aria-expanded]="mobileNavOpen()"
    [attr.aria-label]="mobileNavOpen() ? 'Close navigation' : 'Open navigation'">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <!-- Backdrop only rendered on mobile when drawer is open. Tap dismisses. -->
  @if (mobileNavOpen()) {
    <div class="sidebar-backdrop" (click)="closeMobileNav()" aria-hidden="true"></div>
  }

  <aside class="sidebar" [class.is-open]="mobileNavOpen()">
    <a routerLink="/" class="sidebar-logo">
      <img src="logo.png" alt="Azens" class="sidebar-logo-mark" />
      <span>Azens</span>
    </a>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="sidebar-link">
          <span class="sidebar-icon">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar">
        {{ (auth.user()?.full_name ?? auth.user()?.email ?? '?')[0].toUpperCase() }}
      </div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">{{ auth.user()?.full_name ?? 'My account' }}</span>
        <span class="sidebar-user-email">{{ auth.user()?.email }}</span>
      </div>
      <button class="sidebar-logout" (click)="auth.logout()" title="Log out">↪</button>
    </div>
  </aside>

  <main class="shell-main">
    <app-verify-banner />
    <app-active-session-banner />
    <router-outlet />
  </main>
</div>
