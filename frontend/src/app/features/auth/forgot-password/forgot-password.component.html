<app-auth-layout title="Reset your password" subtitle="Enter your email and we'll send you a reset link">

  @if (!submitted()) {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-fields">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="form-input"
            formControlName="email"
            placeholder="you@example.com"
          />
        </div>
        <button
          type="submit"
          class="btn btn-primary submit-btn"
          [disabled]="isLoading()">
          Send reset link
        </button>
      </div>
    </form>
  } @else {
    <div class="success-box">
      <p>If that email is registered, a reset link is on its way.</p>
    </div>
  }

  <p class="auth-footer">
    <a routerLink="/auth/login" class="auth-link">← Back to sign in</a>
  </p>

</app-auth-layout>
